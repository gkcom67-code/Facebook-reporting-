<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GKH Report Center</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#111827;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h1{
text-align:center;
color:white;
margin-bottom:10px;
}

p{
text-align:center;
color:#94a3b8;
margin-bottom:25px;
font-size:14px;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
color:white;
font-size:14px;
}

input,
select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:#1e293b;
color:white;
font-size:15px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.success{
display:none;
margin-top:15px;
background:#052e16;
padding:12px;
border-radius:12px;
text-align:center;
color:#86efac;
font-size:14px;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<h1>GKH Report</h1>

<p>Facebook Profile Report System</p>

<form id="reportForm">

<label>Facebook Profile Link</label>

<input
type="url"
id="profile"
placeholder="https://facebook.com/username"
required
>

<label>Report Category</label>

<select id="reason">

<option>18+ Content</option>

<option>Sexual Service Promotion</option>

<option>Adult Video Call Service</option>

<option>Explicit Video Call Activity</option>

<option>Selling Adult Content</option>

<option>Sexual Exploitation Concern</option>

<option>Fake Account</option>

<option>Spam Activity</option>

<option>Harassment</option>

<option>Violence</option>

<option>Scam / Fraud</option>

<option>Nudity Content</option>

</select>

<label>Extra Details</label>

<select id="details">

<option>Profile sharing inappropriate adult content</option>

<option>Offering sexual services through video calls</option>

<option>Selling explicit or adult content online</option>

<option>Sending inappropriate private messages</option>

<option>Violating Facebook community standards</option>

<option>Suspicious or spam activity detected</option>

<option>Using fake identity or fake pictures</option>

</select>

<button type="submit">
Open Facebook Report
</button>

<div class="success" id="successBox">
Facebook report form opened successfully
</div>

</form>

<div class="footer">
Powered by GKH
</div>

</div>

<script>

document.getElementById(
"reportForm"
).addEventListener("submit", function(e){

e.preventDefault();

let reason =
document.getElementById("reason").value;

let reportUrl =
"https://www.facebook.com/report";

/* CATEGORY BASED REPORT FORMS */

switch(reason){

case "18+ Content":
reportUrl =
"https://m.facebook.com/help/contact/209046679279097";
break;

case "Sexual Service Promotion":
reportUrl =
"https://m.facebook.com/help/contact/209046679279097";
break;

case "Adult Video Call Service":
reportUrl =
"https://m.facebook.com/help/contact/209046679279097";
break;

case "Explicit Video Call Activity":
reportUrl =
"https://m.facebook.com/help/contact/209046679279097";
break;

case "Selling Adult Content":
reportUrl =
"https://m.facebook.com/help/contact/209046679279097";
break;

case "Sexual Exploitation Concern":
reportUrl =
"https://m.facebook.com/help/contact/209046679279097";
break;

case "Fake Account":
reportUrl =
"https://m.facebook.com/help/contact/295309487309948";
break;

case "Spam Activity":
reportUrl =
"https://m.facebook.com/help/contact/274459462613911";
break;

case "Harassment":
reportUrl =
"https://m.facebook.com/help/contact/360241667357478";
break;

case "Violence":
reportUrl =
"https://m.facebook.com/help/contact/584460464982589";
break;

case "Scam / Fraud":
reportUrl =
"https://m.facebook.com/help/contact/228813257197480";
break;

default:
reportUrl =
"https://www.facebook.com/report";

}

/* SHOW SUCCESS */

document.getElementById(
"successBox"
).style.display="block";

/* OPEN FACEBOOK FORM */

window.location.href = reportUrl;

});

</script>

</body>
</html>
